{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEST123</title>
    <link rel="stylesheet" href="{% static 'boards/css/style.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">WhiteboardPro</div>
      <div class="board-title-container">
        <input type="text" id="board-title" value="Untitled Board" />
      </div>
      <div class="nav-right">
        <div class="collaborators">
          <div class="avatar">A</div>
          <div class="avatar">J</div>
          <div class="avatar">M</div>
        </div>

        <button>Share Board</button>
      </div>
    </nav>

    <div class="main-container">
      <div class="toolbar">
        <button class="tool-btn" id="pencil-tool">
          <i data-lucide="pencil"></i>
        </button>

        <button class="tool-btn" id="hand-tool">
          <i data-lucide="hand"></i>
        </button>

        <button class="tool-btn" id="eraser-tool">
          <i data-lucide="eraser"></i>
        </button>

        <button class="tool-btn" id="shape-tool">
          <i data-lucide="shapes"></i>
        </button>

        <button class="tool-btn" id="text-tool">
          <i data-lucide="type"></i>
        </button>
      </div>

      <div id="shape-menu" class="shape-menu hidden">
        <div class="shape-header">
          <h4>Shapes</h4>

          <button id="close-shapes">✕</button>
        </div>
        <input type="text" id="shape-search" placeholder="Search shapes...." />

        <div class="shape-library">
          <div class="shape-section">
            <h5>Recents</h5>
            <div class="shape-grid">
              <button class="shape-item" data-shape="diamond">◇</button>
              <button class="shape-item" data-shape="rect">□</button>
              <button class="shape-item" data-shape="circle">○</button>
            </div>
          </div>

          <div class="shape-section">
            <h5>Connectors</h5>
            <div class="shape-grid">
              <button class="shape-item" data-shape="line">╱</button>
              <button class="shape-item" data-shape="arrow">↗</button>
              <button class="shape-item" data-shape="curved">↪</button>
            </div>
          </div>

          <div class="shape-section">
            <h5>Basic</h5>

            <div class="shape-grid">
              <button class="shape-item" data-shape="rect">□</button>
              <button class="shape-item" data-shape="circle">○</button>
              <button class="shape-item" data-shape="diamond">◇</button>
              <button class="shape-item" data-shape="triangle">△</button>
              <button class="shape-item" data-shape="star">★</button>
              <button class="shape-item" data-shape="hexagon">⬡</button>
            </div>
          </div>

          <div class="shape-section">
            <h5>Flowchart</h5>
            <div class="shape-grid">
              <button class="shape-item" data-shape="process">▭</button>

              <button class="shape-item" data-shape="decision">◇</button>

              <button class="shape-item" data-shape="database">🛢</button>

              <button class="shape-item" data-shape="document">
                <i data-lucide="file"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="canvas-container">
        <div class="zoom-controls">
          <button id="zoom-in">
            <i class="fa-solid fa-plus"></i>
          </button>

          <button id="zoom-out">
            <i class="fa-solid fa-minus"></i>
          </button>

          <button id="zoom-reset">
            <i class="fa-solid fa-expand"></i>
          </button>
        </div>
        <canvas id="whiteboard"></canvas>
      </div>
    </div>

    <script src="{% static 'boards/js/app.js' %}"></script>
  </body>
</html>
